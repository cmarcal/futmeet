services:
  db:
    image: postgres:16-alpine
    profiles: [dev, deploy]
    environment:
      POSTGRES_DB: futmeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: migrate
    profiles: [deploy]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: runtime
    profiles: [deploy]
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
